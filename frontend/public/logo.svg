<svg width="820" height="220" viewBox="0 0 820 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sultan Furniture">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D7B77A"/>
      <stop offset="0.55" stop-color="#C5A059"/>
      <stop offset="1" stop-color="#8E6F3E"/>
    </linearGradient>
    <filter id="softGlow" x="-40" y="-40" width="200" height="200" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.77  0 0 0 0 0.63  0 0 0 0 0.35  0 0 0 0.55 0" result="goldBlur"/>
      <feMerge>
        <feMergeNode in="goldBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Mark -->
  <g transform="translate(24,34)">
    <rect x="0" y="0" width="152" height="152" rx="36" fill="#000B1A"/>
    <rect x="10" y="10" width="132" height="132" rx="30" fill="#0B1A33" stroke="rgba(255,255,255,0.06)"/>
    <g filter="url(#softGlow)">
      <path d="M76 36C93.673 36 108 50.327 108 68V86C108 103.673 93.673 118 76 118C58.327 118 44 103.673 44 86V68C44 50.327 58.327 36 76 36Z" fill="url(#gold)" opacity="0.95"/>
      <path d="M58 78C58 68.059 66.059 60 76 60C85.941 60 94 68.059 94 78V86C94 95.941 85.941 104 76 104C66.059 104 58 95.941 58 86V78Z" fill="#000B1A" opacity="0.85"/>
      <path d="M52 120H100" stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(206,72)">
    <text x="0" y="58" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="68" font-weight="900" letter-spacing="-1.5" fill="#0B1220">
      Sultan
    </text>
    <text x="0" y="112" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="6" fill="#64748B">
      FURNITURE ERP
    </text>
    <rect x="0" y="128" width="220" height="8" rx="4" fill="url(#gold)"/>
  </g>
</svg>

